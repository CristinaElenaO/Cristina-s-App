<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cristina's Reservations</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Reservation Planner</h1>
      <p class="subtitle">Create reservations and prepare WhatsApp reminders.</p>

      <form id="reservation-form" class="card">
        <label>
          Person
          <input id="person" name="person" type="text" placeholder="Client name" required />
        </label>

        <label>
          Phone number
          <input
            id="phone"
            name="phone"
            type="tel"
            inputmode="tel"
            placeholder="+40700000000"
            required
          />
        </label>

        <label>
          Reservation date and time
          <input id="reservationDate" name="reservationDate" type="datetime-local" required />
        </label>

        <button type="submit">Add reservation</button>
      </form>

      <section>
        <h2>Upcoming reservations</h2>
        <p id="empty-state">No reservations added yet.</p>
        <ul id="reservations" class="reservations"></ul>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
